spring:
  application:
    name: telegram-bot

server:
  port: ${TELEGRAM_BOT_PORT:8086}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}
    admin-contact: ${TELEGRAM_ADMIN_CONTACT}

bot:
  notification:
    poll-interval-ms: ${NOTIFICATION_POLL_INTERVAL_MS:15000}

clients:
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8085}
  booking:
    base-url: ${BOOKING_SERVICE_URL:http://localhost:8084}
  payment:
    base-url: ${PAYMENT_SERVICE_URL:http://localhost:8087}
  user:
    base-url: ${USER_SERVICE_URL:http://localhost:8083}
  notification:
    base-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}

logging:
  level:
    ru.haritonenko.telegrambot: ${LOGGING_LEVEL_RU_HARITONENKO_TELEGRAMBOT:INFO}
